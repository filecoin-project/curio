[package]
name = "cuzk-daemon"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Standalone binary for the cuzk proving daemon"

[features]
default = ["supraseal"]
supraseal = ["cuzk-core/cuda-supraseal"]
vulkan-cuzk = ["cuzk-core/vulkan-cuzk"]

[[bin]]
name = "cuzk-daemon"
path = "src/main.rs"

[dependencies]
cuzk-core = { workspace = true, default-features = false }
cuzk-proto = { workspace = true }
cuzk-server = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
tonic = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
toml = { workspace = true }
anyhow = { workspace = true }
rayon = { workspace = true }
serde_json = { workspace = true }
