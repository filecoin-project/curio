<!doctype html>
<html lang="en">
<head>
    <title>Curio Cluster Overview</title>
    <script src="https://unpkg.com/htmx.org@1.9.5"
        integrity="sha384-xcuj3WpfgjlKF+FXhSQFQ0ZNr39ln+hwjN3npfM9VBnUskLolQAcN80McRIVOPuO"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="index-boot.mjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"

            crossorigin="anonymous" />
</head>
<body style="visibility:hidden">
    <curio-ux>
        <div class="page">
            <div class="info-block" style="max-width: 1000px">
                <h2>Chain Connectivity</h2>
                <chain-connectivity></chain-connectivity>
            </div>

            <div class="info-block" style="max-width: 1000px">
                <h2>Chain Node Network</h2>
                <network-summary></network-summary>
            </div>

            <cluster-machines></cluster-machines>

            <div class="info-block curio-only" style="max-width: 1000px">
                <h2>Actor Summary</h2>
                <actor-summary></actor-summary>
            </div>

            <div class="info-block curio-only">
                <h2>Recent Wins</h2>
                <win-stats></win-stats>
            </div>

            <div class="curio-only">
            <pipeline-porep></pipeline-porep>
            <pipeline-stats></pipeline-stats>
            </div>
        </div>
    </curio-ux>

</html>
