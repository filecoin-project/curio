name: Self-hosted runners example

on:
  push:

jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ["self-hosted", "linux", "x64", "2xlarge"]

    steps:
    - uses: actions/checkout@v6
      with:
        ref: aws-ci
    - run: |
        chmod +x scripts/ci-scripts/build-ami.sh
        sudo ./scripts/ci-scripts/build-ami.sh
      shell: bash
