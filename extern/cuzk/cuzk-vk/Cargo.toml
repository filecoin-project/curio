[package]
name = "cuzk-vk"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "Vulkan compute backend for cuZK Groth16 (BLS12-381)"
build = "build.rs"

[dependencies]
anyhow = "1"
ash = { version = "0.38", default-features = false, features = ["loaded", "debug"] }
blst = "0.3.10"
blstrs = { workspace = true, features = ["gpu", "__private_bench"] }
ff = { workspace = true }
gpu-allocator = { version = "0.27", default-features = false, features = ["vulkan"] }
thiserror = "1"

[build-dependencies]
# `__private_bench` is required in blstrs 0.7 to export `Fp` at the crate root.
blst = "0.3.10"
blstrs = { workspace = true, features = ["gpu", "__private_bench"] }
ec-gpu = { workspace = true }
ec-gpu-gen = { workspace = true }
ff = { workspace = true }
naga = { workspace = true }

[dev-dependencies]
blstrs = { workspace = true, features = ["gpu", "__private_bench"] }
ec-gpu = { workspace = true }
ec-gpu-gen = { workspace = true }
ff = { workspace = true }
rand = "0.8"
rand_chacha = "0.3"
