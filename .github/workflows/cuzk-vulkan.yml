name: cuzk Vulkan

on:
  push:
    paths:
      - "extern/cuzk/**"
      - "extern/ec-gpu-gen/**"
      - "extern/bellperson/**"
      - ".github/workflows/cuzk-vulkan.yml"
      - "cuzk-vulkan-optimization-roadmap.md"
      - "benchmarks/cuzk-vk/**"
  pull_request:
    paths:
      - "extern/cuzk/**"
      - "extern/ec-gpu-gen/**"
      - "extern/bellperson/**"
      - ".github/workflows/cuzk-vulkan.yml"
      - "cuzk-vulkan-optimization-roadmap.md"
      - "benchmarks/cuzk-vk/**"

jobs:
  cpu:
    name: cuzk Phase 0 + cuzk-vk build (hosted)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extern/cuzk
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Phase 0 tests + cuzk-vk smoke (script)
        env:
          CUZK_VK_SKIP_SMOKE: "1"
        run: bash scripts/run-all-tests.sh

      - name: §1 partition timing CSV row (Lavapipe + prove path)
        working-directory: extern/cuzk
        env:
          CUZK_VK_SKIP_SMOKE: "1"
          CUZK_VK_CI_TIMINGS_ROW: "1"
          CUZK_VK_BENCH_CSV: ${{ github.workspace }}/benchmarks/cuzk-vk/results-ci-github-actions.csv
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers
          export VK_ICD_FILENAMES="$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -1)"
          if [[ -z "${VK_ICD_FILENAMES}" ]]; then echo "Lavapipe ICD not found"; ls -la /usr/share/vulkan/icd.d/ || true; exit 1; fi
          echo "VK_ICD_FILENAMES=${VK_ICD_FILENAMES}"
          cargo test -p cuzk-vk --test ci_partition_csv_row -- --test-threads=1

  # Requires org runner labels [self-hosted, vulkan, amd] — enable when available.
  amd-vulkan:
    name: cuzk-vk integration (self-hosted AMD)
    if: false
    runs-on: [self-hosted, vulkan, amd]
    defaults:
      run:
        working-directory: extern/cuzk
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Full cuzk-vk tests + bellperson mimc (Vulkan feature)
        run: |
          cargo test -p cuzk-vk
          cd ../bellperson && cargo test --no-default-features --features groth16,vulkan-cuzk --test mimc
