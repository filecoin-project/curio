name: curio-devnet

x-logging:
  &default-logging
  options:
    max-size: '20m'
    max-file: '3'
  driver: json-file

networks:
  curio-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  lotus:
    container_name: lotus
    image: ${LOTUS_IMAGE}
    init: true
    ports:
      - "1234:1234"
      - "9090:9090"
    environment:
      - LOTUS_FEVM_ENABLEETHRPC=true
      - LOTUS_API_LISTENADDRESS=/dns/lotus/tcp/1234/http
      - LOTUS_LIBP2P_LISTENADDRESSES=/ip4/0.0.0.0/tcp/9090
      - LOTUS_CHAININDEXER_ENABLEINDEXER=true
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./data/lotus:/var/lib/lotus:rw
      - ./data/genesis:/var/lib/genesis:rw
      - ${FIL_PROOFS_PARAMETER_CACHE}:/var/tmp/filecoin-proof-parameters:rw
    networks:
      curio-net:
        ipv4_address: 172.20.0.2

  contracts-bootstrap:
    container_name: contracts-bootstrap
    image: ${CONTRACTS_BOOTSTRAP_IMAGE}
    init: true
    depends_on:
      - lotus
    environment:
      - FILECOIN_SERVICES_REPO=${FILECOIN_SERVICES_REPO}
      - FILECOIN_SERVICES_REF=${FILECOIN_SERVICES_REF}
      - MULTICALL3_REPO=${MULTICALL3_REPO}
      - MULTICALL3_REF=${MULTICALL3_REF}
      - CONTRACT_SOURCE_MODE=${CONTRACT_SOURCE_MODE}
      - FILECOIN_SERVICES_LOCAL_PATH=/opt/local-src/filecoin-services
      - MULTICALL3_LOCAL_PATH=/opt/local-src/multicall3
      - CONTRACT_SERVICE_NAME=${CONTRACT_SERVICE_NAME}
      - CONTRACT_SERVICE_DESCRIPTION=${CONTRACT_SERVICE_DESCRIPTION}
      - CONTRACT_DEPLOYER_PASSWORD=${CONTRACT_DEPLOYER_PASSWORD}
      - DEPLOYER_FUND_AMOUNT_FIL=${DEPLOYER_FUND_AMOUNT_FIL}
      - FORCE_REDEPLOY=${FORCE_REDEPLOY}
      - CONTRACT_ENV_FILE=/var/lib/contracts/curio-devnet.env
      - CONTRACT_ADDRESSES_FILE=/var/lib/contracts/contract_addresses.json
      - GENESIS_PRESEAL_KEY=/var/lib/genesis/pre-seal-t01000.key
      - LOTUS_RPC_URL=http://lotus:1234/rpc/v1
      - CHAIN_ID=31415926
    restart: "no"
    logging: *default-logging
    volumes:
      - ./data/contracts:/var/lib/contracts:rw
      - ./data/lotus:/var/lib/lotus:ro
      - ./data/genesis:/var/lib/genesis:ro
      - ${FILECOIN_SERVICES_LOCAL_DIR}:/opt/local-src/filecoin-services:ro
      - ${MULTICALL3_LOCAL_DIR}:/opt/local-src/multicall3:ro
    networks:
      curio-net:
        ipv4_address: 172.20.0.8

  lotus-miner:
    container_name: lotus-miner
    image: ${LOTUS_MINER_IMAGE}
    init: true
    ports:
      - "2345:2345"
    environment:
      - LOTUS_API_LISTENADDRESS=/dns/lotus-miner/tcp/2345/http
      - LOTUS_API_REMOTELISTENADDRESS=lotus-miner:2345
      - LOTUS_SEALING_BATCHPRECOMMITS=false
      - LOTUS_SEALING_AGGREGATECOMMITS=false
      - LOTUS_SUBSYSTEMS_ENABLEMARKETS=false
      - LOTUS_SEALING_WAITDEALSDELAY=20s
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./data/lotus-miner:/var/lib/lotus-miner:rw
      - ./data/lotus:/var/lib/lotus:ro
      - ./data/genesis:/var/lib/genesis:ro
      - ${FIL_PROOFS_PARAMETER_CACHE}:/var/tmp/filecoin-proof-parameters:rw
    networks:
      curio-net:
        ipv4_address: 172.20.0.3

  curio:
    container_name: curio
    image: ${CURIO_IMAGE}
    init: true
    depends_on:
      contracts-bootstrap:
        condition: service_completed_successfully
    ports:
      - "12300:12300" # API
      - "4701:4701" # UI
      - "12310:12310" # Market
    environment:
      - CURIO_REPO_PATH=/var/lib/curio
      - CURIO_HARMONYDB_HOSTS=yugabyte
      - CONTRACT_ENV_FILE=/var/lib/contracts/curio-devnet.env
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./data/curio:/var/lib/curio:rw
      - ./data/lotus:/var/lib/lotus:ro
      - ./data/lotus-miner:/var/lib/lotus-miner:ro
      - ./data/contracts:/var/lib/contracts:ro
      - ${FIL_PROOFS_PARAMETER_CACHE}:/var/tmp/filecoin-proof-parameters:rw
    networks:
      curio-net:
        ipv4_address: 172.20.0.4

  yugabyte:
    container_name: yugabyte
    image: yugabytedb/yugabyte:2024.1.0.0-b129
    init: true
    environment:
      - TINI_SUBREAPER=true
    ports:
      - "5433:5433"
      - "9042:9042"
      - "15433:15433"
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./data/yugabyte:/home/yugabyte/yb_data
    command: ["bin/yugabyted", "start", "--base_dir=/home/yugabyte/yb_data", "--background=false"]
    networks:
      curio-net:
        ipv4_address: 172.20.0.5

  piece-server:
    container_name: piece-server
    image: ${PIECE_SERVER_IMAGE}
    init: true
    ports:
      - "12320:12320" # piece-server
    environment:
      - CURIO_MK12_CLIENT_REPO=/var/lib/curio-client
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./data/piece-server:/var/lib/curio-client:rw
      - ./data/curio:/var/lib/curio:ro
      - ./data/lotus:/var/lib/lotus:ro
      - ./data/lotus-miner:/var/lib/lotus-miner:ro
      - ${FIL_PROOFS_PARAMETER_CACHE}:/var/tmp/filecoin-proof-parameters:rw
    networks:
      curio-net:
        ipv4_address: 172.20.0.6

  indexer:
    container_name: indexer
    image: ${INDEXER_IMAGE}
    init: true
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
      - "3003:3003"
    environment:
      - STORETHEINDEX_PATH=/var/lib/indexer
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./data/indexer:/var/lib/indexer:rw
      - ./data/curio:/var/lib/curio:ro
      - ./data/lotus:/var/lib/lotus:ro
      - ./data/lotus-miner:/var/lib/lotus-miner:ro
      - ${FIL_PROOFS_PARAMETER_CACHE}:/var/tmp/filecoin-proof-parameters:rw
    networks:
      curio-net:
        ipv4_address: 172.20.0.7
